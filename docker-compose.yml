name: resource_community_go

services:
  mysql:
    image: mysql:8.4
    container_name: resource-community-go-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-resource_community_go}
      MYSQL_USER: ${MYSQL_USER:-resource_community_go}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-resource_community_go}
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: resource-community-go-redis
    restart: unless-stopped
    ports:
      - "6381:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    container_name: resource-community-go-rabbitmq
    restart: unless-stopped
    ports:
      - "5674:5672"
      - "15674:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: resource-community-go-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      RESOURCE_COMMUNITY_GO_APP_PORT: ${RESOURCE_COMMUNITY_GO_APP_PORT:-3000}
      RESOURCE_COMMUNITY_GO_ENABLE_PPROF: ${RESOURCE_COMMUNITY_GO_ENABLE_PPROF:-false}
      RESOURCE_COMMUNITY_GO_SLOW_REQUEST_THRESHOLD_MS: ${RESOURCE_COMMUNITY_GO_SLOW_REQUEST_THRESHOLD_MS:-500}
      RESOURCE_COMMUNITY_GO_DATABASE_DSN: ${RESOURCE_COMMUNITY_GO_DATABASE_DSN:-resource_community_go:resource_community_go@tcp(mysql:3306)/resource_community_go?charset=utf8mb4&parseTime=True&loc=Local}
      RESOURCE_COMMUNITY_GO_REDIS_ADDR: ${RESOURCE_COMMUNITY_GO_REDIS_ADDR:-redis:6379}
      RESOURCE_COMMUNITY_GO_REDIS_PASSWORD: ${RESOURCE_COMMUNITY_GO_REDIS_PASSWORD:-}
      RESOURCE_COMMUNITY_GO_REDIS_DB: ${RESOURCE_COMMUNITY_GO_REDIS_DB:-0}
      RESOURCE_COMMUNITY_GO_RABBITMQ_URL: ${RESOURCE_COMMUNITY_GO_RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
      RESOURCE_COMMUNITY_GO_RABBITMQ_EXCHANGE: ${RESOURCE_COMMUNITY_GO_RABBITMQ_EXCHANGE:-resource_community_go.async}
      RESOURCE_COMMUNITY_GO_RABBITMQ_QUEUE: ${RESOURCE_COMMUNITY_GO_RABBITMQ_QUEUE:-resource_community_go.async.jobs}
      RESOURCE_COMMUNITY_GO_JWT_SECRET: ${RESOURCE_COMMUNITY_GO_JWT_SECRET:-secret}
      RESOURCE_COMMUNITY_GO_UPLOAD_DIR: ${RESOURCE_COMMUNITY_GO_UPLOAD_DIR:-uploads}
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - backend_uploads:/app/uploads
    working_dir: /app
    command: ["go", "run", "."]

  worker:
    build:
      context: ./backend
    container_name: resource-community-go-worker
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      RESOURCE_COMMUNITY_GO_DATABASE_DSN: ${RESOURCE_COMMUNITY_GO_DATABASE_DSN:-resource_community_go:resource_community_go@tcp(mysql:3306)/resource_community_go?charset=utf8mb4&parseTime=True&loc=Local}
      RESOURCE_COMMUNITY_GO_REDIS_ADDR: ${RESOURCE_COMMUNITY_GO_REDIS_ADDR:-redis:6379}
      RESOURCE_COMMUNITY_GO_REDIS_PASSWORD: ${RESOURCE_COMMUNITY_GO_REDIS_PASSWORD:-}
      RESOURCE_COMMUNITY_GO_REDIS_DB: ${RESOURCE_COMMUNITY_GO_REDIS_DB:-0}
      RESOURCE_COMMUNITY_GO_RABBITMQ_URL: ${RESOURCE_COMMUNITY_GO_RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
      RESOURCE_COMMUNITY_GO_RABBITMQ_EXCHANGE: ${RESOURCE_COMMUNITY_GO_RABBITMQ_EXCHANGE:-resource_community_go.async}
      RESOURCE_COMMUNITY_GO_RABBITMQ_QUEUE: ${RESOURCE_COMMUNITY_GO_RABBITMQ_QUEUE:-resource_community_go.async.jobs}
      RESOURCE_COMMUNITY_GO_JWT_SECRET: ${RESOURCE_COMMUNITY_GO_JWT_SECRET:-secret}
      RESOURCE_COMMUNITY_GO_UPLOAD_DIR: ${RESOURCE_COMMUNITY_GO_UPLOAD_DIR:-uploads}
    volumes:
      - ./backend:/app
      - backend_uploads:/app/uploads
    working_dir: /app
    command: ["go", "run", "./cmd/worker"]

  frontend:
    build:
      context: ./frontend
    container_name: resource-community-go-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3000/api}
      VITE_PROXY_TARGET: ${VITE_PROXY_TARGET:-http://backend:3000}
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    working_dir: /app
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5173"]

volumes:
  mysql_data:
  redis_data:
  backend_uploads:
